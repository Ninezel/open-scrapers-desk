name: Build Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: python scripts/smoke_test.py

      - name: Build executable
        run: python scripts/build_exe.py

      - name: Create release zip
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path dist/OpenScrapersDesk/* -DestinationPath release/OpenScrapersDesk-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenScrapersDesk-windows
          path: dist/OpenScrapersDesk

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenScrapersDesk-windows-zip
          path: release/OpenScrapersDesk-windows.zip
